name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild (generate native Android project)
        run: npx expo prebuild --platform android --no-install

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK (bundled + signed, installable standalone)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ICT-Adaptive-Bot-Pro-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Build Debug APK (dev-only, needs Metro server)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        continue-on-error: true

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ICT-Adaptive-Bot-Pro-debug-apk-DEV-ONLY
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore
